# Reusable workflow to update Dell client libraries to the latest released version on CSM based projects
name: Update Go Client Library Dependencies

on:
  workflow_call:
  # Can be manually triggered
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Update dependencies to latest versions
      run: |
        REPOS=(
          "github.com/dell/goscaleio"
          "github.com/dell/gopowermax"
          "github.com/dell/gounity"
          "github.com/dell/gopowerscale"
          "github.com/dell/gopowerstore"
          "github.com/dell/gobrick"
          "github.com/dell/gocsi"
          "github.com/dell/goiscsi"
          "github.com/dell/gonvme"
          "github.com/dell/goobjectscale"
          "github.com/dell/gofsutil"
          "github.com/dell/dell-csi-extensions"
          "github.com/dell/csi-metadata-retriever"
          "github.com/dell/csi-volumegroup-snapshotter"
        )
        for REPO in "${REPOS[@]}"; do
          go get $REPO@latest
        done
        go mod tidy

    # Needed for signing commits using Github App tokens
    # See: https://github.com/peter-evans/create-pull-request/blob/main/docs/concepts-guidelines.md#commit-signing
    - uses: actions/create-github-app-token@v1.11.0
      id: generate-token
      with:
        app-id: ${{ vars.CSM_RELEASE_APP_ID }}
        private-key: ${{ secrets.CSM_RELEASE_APP_PRIVATE_KEY }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ steps.generate-token.outputs.token }}
        branch: "update-dependencies"
        commit-message: "Update dependencies to latest versions"
        title: "Update client libraries to latest"
        body: |
            This PR updates the specified dependencies to their latest released versions.
            Auto-generated by [common-github-actions](https://github.com/dell/common-github-actions)
        sign-commits: true
        delete-branch: true
